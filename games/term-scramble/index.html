<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Term Scramble</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="stats-row">
            <div class="stat">SCORE: <span id="score">0</span></div>
            <div class="stat">TIME: <span id="timer">30</span>s</div>
        </div>
        
        <div id="jumbled-word" class="jumbled-word"></div>
        <div id="hint" class="hint"></div>
        
        <div class="input-area">
            <input type="text" id="answer-input" placeholder="Unscramble it..." autocomplete="off">
            <button id="submit-btn" class="btn-primary">SUBMIT</button>
        </div>
        
        <div id="gameover" class="gameover hidden">
            <h2 id="result-msg">Time's Up!</h2>
            <p id="stats-msg"></p>
            <button id="restart-btn" class="btn-primary">Play Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
