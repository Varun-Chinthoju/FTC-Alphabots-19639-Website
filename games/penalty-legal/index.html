<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty or Legal?</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="stats-row">
            <div class="stat">STREAK: <span id="streak">0</span></div>
            <div class="stat">BEST: <span id="high-streak">0</span></div>
        </div>
        
        <div class="scenario-card">
            <div id="scenario-text" class="scenario-text"></div>
        </div>
        
        <div class="options-row">
            <button class="choice-btn penalty" onclick="handleChoice(true)">PENALTY</button>
            <button class="choice-btn legal" onclick="handleChoice(false)">LEGAL</button>
        </div>
        
        <div id="feedback" class="feedback hidden"></div>
        
        <div id="gameover" class="gameover hidden">
            <h2 id="result-msg">Incorrect Ruling!</h2>
            <p id="explanation"></p>
            <button id="restart-btn" class="btn-primary" onclick="initGame()">Restart Streak</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
