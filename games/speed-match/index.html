<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="stats-row">
            <div class="stat">SCORE: <span id="score">0</span></div>
            <div class="stat">TIME: <span id="timer">20</span>s</div>
        </div>
        
        <div id="target-item" class="target-item">MOTOR</div>
        
        <div class="options-row">
            <button class="choice-btn" onclick="handleChoice('HARDWARE')">HARDWARE</button>
            <button class="choice-btn" onclick="handleChoice('SOFTWARE')">SOFTWARE</button>
        </div>
        
        <div id="gameover" class="gameover hidden">
            <h2>Fast Hands!</h2>
            <p id="stats-msg"></p>
            <button id="restart-btn" class="btn-primary" onclick="initGame()">Play Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
